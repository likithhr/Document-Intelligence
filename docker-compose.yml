version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: docai-postgres
    environment:
      POSTGRES_DB: docai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d docai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: